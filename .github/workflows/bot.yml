name: Bot Scan

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-bots:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - run: python analyzer.py
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run bot v1
        run: python bot.py
        env:
          BOT_ID: bot_v1

      - name: Run bot v2
        run: python bot.py
        env:
          BOT_ID: bot_v2

      - name: Commit data
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add data.json
          git commit -m "update data" || echo "no changes"
          git push
